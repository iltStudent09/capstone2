name: CI Build and Test

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: customer-app/package-lock.json

      - name: Install frontend dependencies
        working-directory: customer-app
        run: npm ci

      - name: Run tests
        working-directory: customer-app
        run: npm run test:run

      - name: Build frontend
        working-directory: customer-app
        run: npm run build
