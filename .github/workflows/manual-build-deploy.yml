name: Manual Build or Deploy

on:
  workflow_dispatch:
    inputs:
      action:
        description: Choose what to run
        required: true
        default: build
        type: choice
        options:
          - build
          - deploy

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: manual-pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: customer-app/package-lock.json

      - name: Install frontend dependencies
        working-directory: customer-app
        run: npm ci

      - name: Build frontend
        working-directory: customer-app
        run: npm run build

      - name: Upload build artifact (manual build)
        if: ${{ github.event.inputs.action == 'build' }}
        uses: actions/upload-artifact@v4
        with:
          name: customer-app-dist
          path: customer-app/dist

      - name: Upload Pages artifact (manual deploy)
        if: ${{ github.event.inputs.action == 'deploy' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: customer-app/dist

  deploy:
    if: ${{ github.event.inputs.action == 'deploy' }}
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
